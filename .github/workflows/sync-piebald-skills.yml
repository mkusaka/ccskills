name: Sync Piebald Skills
on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read
concurrency:
  group: sync-piebald-skills
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_BASE_BRANCH: ${{ github.event.repository.default_branch }}
      SYNC_BRANCH: automation/piebald-skill-sync
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure git authentication
        run: gh auth setup-git
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync generated skills
        run: pnpm sync
      - name: Run tests
        run: pnpm test
      - name: Create or update sync PR
        run: pnpm sync:pr
      - name: Detect sync PR
        id: sync_pr
        run: |
          pr_number="$(
            gh pr list \
              --base "$SYNC_BASE_BRANCH" \
              --head "$SYNC_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -z "$pr_number" ]]; then
            echo "No sync PR to merge."
            exit 0
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
      - name: Merge sync PR
        if: steps.sync_pr.outputs.number != ''
        env:
          PR_NUMBER: ${{ steps.sync_pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --merge --delete-branch
    permissions:
      checks: read
      contents: write
      pull-requests: write
      statuses: read
    timeout-minutes: 60
